<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏅 Ironman California Training Plan</title>
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1a22;
    --card2: #22222e;
    --border: #2e2e3e;
    --red: #e8323c;
    --red2: #ff4d57;
    --orange: #f97316;
    --blue: #3b82f6;
    --green: #22c55e;
    --yellow: #eab308;
    --purple: #a855f7;
    --text: #f0f0f5;
    --muted: #8888a0;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }


  /* APP */
  #app { display: block; }

  /* HEADER */
  .header {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 16px 20px; position: sticky; top: 0; z-index: 100;
  }
  .header-top {
    display: flex; align-items: center; justify-content: space-between;
    max-width: 900px; margin: 0 auto;
  }
  .header-title { font-size: 16px; font-weight: 700; }
  .header-title span { color: var(--red); }
  .header-race { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .logout-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .logout-btn:hover { color: var(--text); border-color: var(--text); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    max-width: 900px; margin: 12px auto 0;
  }
  .progress-stats {
    display: flex; gap: 20px; font-size: 12px; color: var(--muted); margin-bottom: 6px;
  }
  .progress-stats strong { color: var(--text); }
  .progress-track {
    background: var(--bg); border-radius: 999px; height: 6px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, var(--red), var(--orange));
    transition: width 0.4s ease;
  }

  /* TABS */
  .tabs {
    max-width: 900px; margin: 0 auto;
    display: flex; gap: 4px; padding: 16px 20px 0;
  }
  .tab-btn {
    background: none; border: none; padding: 8px 16px;
    color: var(--muted); font-size: 14px; font-weight: 500;
    border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.2s;
  }
  .tab-btn.active { color: var(--text); border-color: var(--red); }

  /* CONTENT */
  .content { max-width: 900px; margin: 0 auto; padding: 20px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* WEEK NAVIGATOR */
  .week-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px; gap: 12px;
  }
  .week-nav-btn {
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); padding: 8px 16px; border-radius: 8px;
    font-size: 14px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .week-nav-btn:hover { border-color: var(--red); color: var(--red); }
  .week-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .week-info { text-align: center; flex: 1; }
  .week-num { font-size: 18px; font-weight: 700; }
  .week-phase { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .week-note {
    background: #1a1500; border: 1px solid #3a3000; border-radius: 10px;
    padding: 10px 14px; font-size: 13px; color: #d4b800;
    margin-bottom: 16px; display: none;
  }
  .week-hrs {
    font-size: 12px; color: var(--muted); text-align: right;
    margin-bottom: 12px;
  }
  .week-hrs strong { color: var(--orange); }

  /* TODAY JUMP */
  .today-btn {
    background: var(--card2); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 12px; border-radius: 8px;
    font-size: 12px; cursor: pointer;
  }
  .today-btn:hover { color: var(--text); }

  /* DAY CARDS */
  .day-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .day-card.today { border-color: var(--orange); }
  .day-card.completed { border-color: #1e3a1e; }
  .day-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
  }
  .day-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 12px;
  }
  .day-check.done { background: var(--green); border-color: var(--green); color: white; }
  .day-date { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; }
  .day-name { font-weight: 600; font-size: 15px; flex-shrink: 0; width: 30px; }
  .type-badge {
    font-size: 11px; font-weight: 600; padding: 3px 8px;
    border-radius: 999px; flex-shrink: 0;
  }
  .day-summary { font-size: 13px; color: var(--muted); flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-chevron { color: var(--muted); font-size: 12px; flex-shrink: 0; transition: transform 0.2s; }
  .day-card.open .day-chevron { transform: rotate(180deg); }
  .day-detail {
    display: none; padding: 0 16px 16px; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 12px;
  }
  .day-card.open .day-detail { display: block; }
  .sched-row.open .day-detail { display: block; padding: 0 14px 14px; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 12px; }
  .detail-section { margin-bottom: 10px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-label {
    font-size: 11px; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  .detail-text { font-size: 14px; line-height: 1.6; color: #d0d0e0; }
  .today-badge {
    background: var(--orange); color: black; font-size: 10px;
    font-weight: 700; padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
  }

  /* TYPE BADGE COLORS */
  .type-swim { background: #0c2a4a; color: #60b0ff; }
  .type-bike { background: #1a2a00; color: #8acc20; }
  .type-run { background: #2a1500; color: #ff8c20; }
  .type-str { background: #2a002a; color: #cc80ff; }
  .type-rest { background: #1a1a1a; color: #888; }
  .type-brick { background: #1a1a00; color: #ffcc00; }
  .type-mixed { background: #001a2a; color: #40c0c0; }

  /* PHASE CARDS */
  .phase-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 12px;
  }
  .phase-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .phase-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .phase-name { font-size: 16px; font-weight: 700; }
  .phase-meta { font-size: 12px; color: var(--muted); margin-left: auto; }
  .phase-focus { font-size: 13px; color: #c0c0d8; line-height: 1.5; margin-bottom: 10px; }
  .phase-milestones {
    background: var(--bg); border-radius: 8px; padding: 10px 12px;
    font-size: 12px; color: var(--muted);
  }
  .phase-milestones strong { color: var(--text); }

  /* ZONE TABLE */
  .zone-table { width: 100%; border-collapse: collapse; }
  .zone-table th {
    text-align: left; padding: 10px 12px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--muted); border-bottom: 1px solid var(--border);
  }
  .zone-table td {
    padding: 12px; font-size: 13px; border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .zone-table tr:last-child td { border-bottom: none; }
  .zone-badge {
    font-weight: 700; font-size: 14px; padding: 4px 10px;
    border-radius: 6px; display: inline-block;
  }

  /* FULL SCHEDULE */
  .sched-phase { margin-bottom: 24px; }
  .sched-phase-header {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px;
  }
  .sched-phase-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .sched-phase-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .sched-week { margin-bottom: 10px; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .sched-week-header {
    background: var(--card2); padding: 8px 14px;
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 8px;
  }
  .sched-week-header.sched-week-today { border-left: 3px solid var(--orange); }
  .sched-wk-label { font-size: 13px; font-weight: 700; color: var(--text); }
  .sched-wk-hrs { font-size: 11px; color: var(--orange); font-weight: 600; }
  .sched-wk-note { font-size: 11px; color: #d4b800; flex-basis: 100%; margin-top: 2px; }
  .sched-row { background: var(--card); border-top: 1px solid var(--border); transition: background 0.15s; }
  .sched-row.sched-today { background: #1a1200; }
  .sched-row.sched-done { opacity: 0.55; }
  .sched-row-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer;
  }
  .sched-check {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; font-size: 11px;
  }
  .sched-check.done { background: var(--green); border-color: var(--green); color: white; }
  .sched-day { font-weight: 600; font-size: 14px; width: 30px; flex-shrink: 0; }
  .sched-date { font-size: 11px; color: var(--muted); width: 75px; flex-shrink: 0; }
  .sched-summary { font-size: 12px; color: var(--muted); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sched-row.open .day-chevron { transform: rotate(180deg); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .day-date { display: none; }
    .progress-stats { flex-wrap: wrap; gap: 8px; }
    .tabs { padding: 12px 12px 0; overflow-x: auto; }
    .tab-btn { white-space: nowrap; }
    .content { padding: 12px; }
  }
</style>
</head>
<body>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title">🏅 <span>Ironman California</span> · Training Plan</div>
        <div class="header-race">Race Day: Sunday, October 18, 2026 · Goal: Sub 11 Hours</div>
      </div>
      <button class="logout-btn" onclick="logout()">Lock</button>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-stats">
        <div><strong id="stat-done">0</strong> days done</div>
        <div><strong id="stat-left">0</strong> remaining</div>
        <div><strong id="stat-pct">0%</strong> complete</div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('plan', this)">📅 Training Plan</button>
    <button class="tab-btn" onclick="switchTab('phases', this)">📊 Phases</button>
    <button class="tab-btn" onclick="switchTab('zones', this)">⚡ Zones</button>
    <button class="tab-btn" onclick="switchTab('schedule', this)">📋 Full Schedule</button>
  </div>

  <div class="content">
    <!-- PLAN TAB -->
    <div id="tab-plan" class="tab-panel active">
      <div class="week-nav">
        <button class="week-nav-btn" id="prev-btn" onclick="changeWeek(-1)">← Prev</button>
        <div class="week-info">
          <div class="week-num" id="week-num">Week 1</div>
          <div class="week-phase" id="week-phase"></div>
        </div>
        <button class="week-nav-btn" id="today-center" onclick="goToToday()">Today</button>
        <button class="week-nav-btn" id="next-btn" onclick="changeWeek(1)">Next →</button>
      </div>
      <div class="week-note" id="week-note"></div>
      <div class="week-hrs" id="week-hrs"></div>
      <div id="days-container"></div>
    </div>

    <!-- PHASES TAB -->
    <div id="tab-phases" class="tab-panel">
      <div id="phases-container"></div>
    </div>

    <!-- ZONES TAB -->
    <div id="tab-zones" class="tab-panel">
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;">
        <table class="zone-table">
          <thead>
            <tr>
              <th>Zone</th><th>Name</th><th>Feel / Talk Test</th><th>Approx HR</th><th>When Used</th>
            </tr>
          </thead>
          <tbody id="zone-tbody"></tbody>
        </table>
      </div>
      <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;color:var(--muted);">
        <strong style="color:var(--text);">Key principle:</strong> 80%+ of all sessions should be Z1–Z2. If in doubt, go easier.
      </div>
    </div>

    <!-- FULL SCHEDULE TAB -->
    <div id="tab-schedule" class="tab-panel">
      <div id="schedule-container"></div>
    </div>
  </div>
</div>

const ZONES = [{"zone": "Z1", "name": "Recovery", "feel": "Full sentences, like walking", "hr": "<130bpm", "when": "Warm-ups, cool-downs, short Friday runs"}, {"zone": "Z2", "name": "Aerobic Base", "feel": "Full sentences, slight effort", "hr": "130–150bpm", "when": "80%+ of ALL training — long rides, runs, swims"}, {"zone": "Z3", "name": "Tempo", "feel": "Short sentences — mildly hard", "hr": "150–162bpm", "when": "Mid-ride surges, portions of tempo runs"}, {"zone": "Z4", "name": "Threshold / FTP", "feel": "3–4 words max — hard but sustainable", "hr": "162–172bpm", "when": "FTP bike intervals Tuesday, tempo run work sections"}, {"zone": "Z5", "name": "VO2 Max", "feel": "Can barely speak — very hard but controlled", "hr": "172–185bpm", "when": "Friday run intervals only. 3min reps. Max once every 3 weeks"}];
const PHASES = [{"phase": "P1 · Foundation", "weeks": "Wks 1–9", "dates": "Mar 23–May 18", "focus": "100% Z2. Build all three disciplines from your current base. 3 swims/week. Recovery weeks 3, 6, 9.", "milestones": "800m→1800m swim · 4hr ride · long run to 100min · all Z2"}, {"phase": "P2 · Build 1", "weeks": "Wks 10–18", "dates": "May 25–Jul 20", "focus": "~88% Z2. Tempo runs Wed from Wk 10. Z5 intervals Fri from Wk 14. FTP bike Tue from Wk 16. Bricks Wks 10,14,17.", "milestones": "2000m→3000m swim · 7hr ride · long run 170min · FTP+tempo+Z5"}, {"phase": "P3 · Build 2", "weeks": "Wks 19–27", "dates": "Jul 27–Sep 21", "focus": "~82% Z2. All quality sessions advancing. Race swim 3800m in Wk 23. Long run 180min from Wk 20. Bricks Wks 20,23,26.", "milestones": "3800m race swim · 8hr ride · long run 3hrs · peak fitness"}, {"phase": "P4 · Peak", "weeks": "Wks 28–29", "dates": "Sep 28–Oct 11", "focus": "~80% Z2. Highest volume weeks. All quality sessions at max. Last big push before taper.", "milestones": "3800m swim · 8hr ride · 3hr long run · all quality sessions"}, {"phase": "P5 · Taper", "weeks": "Wks 30–32", "dates": "Oct 12–Nov 7", "focus": "3-week taper. Volume -35% then -55%. Short race-pace efforts. 3 swims maintained. Trust the fitness.", "milestones": "Volume drops · race-sharp efforts · fly to PCB · RACE DAY"}];

const PHASE_COLORS = {
  'P1': '#3b82f6', 'P2': '#f97316', 'P3': '#e8323c', 'P4': '#a855f7', 'P5': '#22c55e'
};

// Group by weeks
const weeks = {};
TRAINING_DATA.forEach(row => {
  if (!weeks[row.wk]) weeks[row.wk] = [];
  weeks[row.wk].push(row);
});
const weekKeys = Object.keys(weeks);
let currentWeekIdx = 0;
let completedSet = new Set();



const SUPABASE_URL = 'https://vfdyaxazjhzzobabbpla.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmZHlheGF6amh6em9iYWJicGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MDAyODEsImV4cCI6MjA5MTI3NjI4MX0.S6h9mjv9UhziOwkS-rcPsLwmS7WmA01yGY17R4nQArk';

function sbHeaders() {
  return {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=minimal'
  };
}

async function loadCompletionsFromDB() {
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/completions?select=idx', { headers: sbHeaders() });
    if (!r.ok) throw new Error('fetch failed');
    const rows = await r.json();
    if (Array.isArray(rows)) rows.forEach(row => completedSet.add(row.idx));
  } catch(e) {
    const saved = localStorage.getItem('im_completed');
    if (saved) JSON.parse(saved).forEach(i => completedSet.add(i));
  }
}

async function saveCompletion(idx, done) {
  try {
    if (done) {
      await fetch(SUPABASE_URL + '/rest/v1/completions', {
        method: 'POST',
        headers: sbHeaders(),
        body: JSON.stringify({ idx })
      });
    } else {
      await fetch(SUPABASE_URL + '/rest/v1/completions?idx=eq.' + idx, {
        method: 'DELETE',
        headers: sbHeaders()
      });
    }
  } catch(e) { /* silent fail */ }
  localStorage.setItem('im_completed', JSON.stringify([...completedSet]));
}

function saveCompletions() {
  localStorage.setItem('im_completed', JSON.stringify([...completedSet]));
}

async function showApp() {
  TRAINING_DATA.forEach((row, i) => { if (row.checked) completedSet.add(i); });
  await loadCompletionsFromDB();
  renderPhases();
  renderZones();
  goToToday();
  updateProgress();
}


function updateProgress() {
  const total = TRAINING_DATA.length;
  const done = completedSet.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-left').textContent = total - done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function getTypeColor(type) {
  const t = type.toLowerCase();
  if (t === 'rest') return 'type-rest';
  if (t.includes('brick')) return 'type-brick';
  if (t.includes('swim') && t.includes('bike') && t.includes('run')) return 'type-mixed';
  if (t.includes('swim') && (t.includes('str') || t.includes('bike') || t.includes('run'))) return 'type-mixed';
  if (t.includes('swim')) return 'type-swim';
  if (t.includes('bike') || t.includes('ride')) return 'type-bike';
  if (t.includes('run')) return 'type-run';
  if (t.includes('str')) return 'type-str';
  return 'type-mixed';
}

function isToday(dateStr) {
  const today = new Date();
  const d = new Date(dateStr);
  return d.toDateString() === today.toDateString();
}

function findTodayWeekIdx() {
  const today = new Date();
  for (let i = 0; i < weekKeys.length; i++) {
    const wk = weeks[weekKeys[i]];
    for (const row of wk) {
      const d = new Date(row.date);
      if (d >= today) return i;
    }
  }
  return weekKeys.length - 1;
}

function goToToday() {
  currentWeekIdx = findTodayWeekIdx();
  renderWeek();
}

function changeWeek(dir) {
  currentWeekIdx = Math.max(0, Math.min(weekKeys.length - 1, currentWeekIdx + dir));
  renderWeek();
  window.scrollTo(0, 0);
}

function formatDetail(detail) {
  if (!detail || detail === 'nan') return '';
  return detail.replace(/\n/g, '<br><br>').replace(/\n/g, '<br><br>');
}

function getSummary(detail) {
  if (!detail || detail === 'nan') return '';
  const first = detail.split('\n')[0].split('\n')[0];
  return first.length > 80 ? first.substring(0, 80) + '...' : first;
}

function toggleDay(cardEl) {
  cardEl.classList.toggle('open');
}

function toggleComplete(idx, e) {
  e.stopPropagation();
  const checkEl = document.getElementById('check-' + idx);
  const done = !completedSet.has(idx);
  if (!done) {
    completedSet.delete(idx);
    checkEl.classList.remove('done');
    checkEl.textContent = '';
    document.getElementById('card-' + idx)?.classList.remove('completed');
    const sc = document.getElementById('sched-check-' + idx);
    if (sc) { sc.classList.remove('done'); sc.textContent = ''; }
    document.getElementById('sched-card-' + idx)?.classList.remove('sched-done');
  } else {
    completedSet.add(idx);
    checkEl.classList.add('done');
    checkEl.textContent = '✓';
    document.getElementById('card-' + idx)?.classList.add('completed');
    const sc = document.getElementById('sched-check-' + idx);
    if (sc) { sc.classList.add('done'); sc.textContent = '✓'; }
    document.getElementById('sched-card-' + idx)?.classList.add('sched-done');
  }
  saveCompletion(idx, done);
  updateProgress();
}

function renderWeek() {
  const wk = weekKeys[currentWeekIdx];
  const rows = weeks[wk];
  const phase = rows[0].phase;
  const note = rows.find(r => r.weekNote && r.weekNote !== 'nan')?.weekNote || '';
  const hrs = rows.find(r => r.wkHrs && r.wkHrs !== 'nan')?.wkHrs || '';

  document.getElementById('week-num').textContent = wk;
  document.getElementById('week-phase').textContent = phase;
  document.getElementById('prev-btn').disabled = currentWeekIdx === 0;
  document.getElementById('next-btn').disabled = currentWeekIdx === weekKeys.length - 1;

  const noteEl = document.getElementById('week-note');
  if (note) { noteEl.style.display = 'block'; noteEl.textContent = '💡 ' + note; }
  else { noteEl.style.display = 'none'; }

  const hrsEl = document.getElementById('week-hrs');
  if (hrs) hrsEl.innerHTML = `Week volume: <strong>${hrs}</strong>`;
  else hrsEl.innerHTML = '';

  const container = document.getElementById('days-container');
  container.innerHTML = '';

  const globalRows = TRAINING_DATA;

  rows.forEach(row => {
    const idx = globalRows.indexOf(row);
    const done = completedSet.has(idx);
    const today = isToday(row.date);
    const typeClass = getTypeColor(row.type);
    const summary = getSummary(row.detail);
    const detail = formatDetail(row.detail);

    const card = document.createElement('div');
    card.className = 'day-card' + (today ? ' today' : '') + (done ? ' completed' : '');
    card.id = 'card-' + idx;

    card.innerHTML = `
      <div class="day-card-header" onclick="toggleDay(this.parentElement)">
        <div class="day-check ${done ? 'done' : ''}" id="check-${idx}" onclick="toggleComplete(${idx}, event)">${done ? '✓' : ''}</div>
        <div class="day-name">${row.day}</div>
        <div class="day-date">${row.date.replace(', 2026','').replace(', 2025','')}</div>
        ${today ? '<div class="today-badge">TODAY</div>' : ''}
        <div class="type-badge ${typeClass}">${row.type}</div>
        <div class="day-summary">${summary}</div>
        <div class="day-chevron">▼</div>
      </div>
      ${detail ? `
      <div class="day-detail">
        <div class="detail-text">${detail}</div>
      </div>` : ''}
    `;

    container.appendChild(card);
  });
}

function renderPhases() {
  const container = document.getElementById('phases-container');
  const phaseColors = ['#3b82f6','#f97316','#e8323c','#a855f7','#22c55e'];
  PHASES.forEach((p, i) => {
    const color = phaseColors[i] || '#888';
    const pKey = p.phase.split(' ')[0];
    container.innerHTML += `
      <div class="phase-card">
        <div class="phase-header">
          <div class="phase-dot" style="background:${color}"></div>
          <div class="phase-name">${p.phase}</div>
          <div class="phase-meta">${p.weeks} · ${p.dates}</div>
        </div>
        <div class="phase-focus">${p.focus}</div>
        <div class="phase-milestones"><strong>Key milestones:</strong> ${p.milestones}</div>
      </div>`;
  });
}

function renderZones() {
  const tbody = document.getElementById('zone-tbody');
  const zoneColors = {
    'Z1': '#4a9eff', 'Z2': '#22c55e', 'Z3': '#eab308', 'Z4': '#f97316', 'Z5': '#e8323c'
  };
  ZONES.forEach(z => {
    const color = zoneColors[z.zone] || '#888';
    tbody.innerHTML += `
      <tr>
        <td><span class="zone-badge" style="background:${color}22;color:${color}">${z.zone}</span></td>
        <td style="font-weight:600">${z.name}</td>
        <td style="color:var(--muted)">${z.feel}</td>
        <td style="color:var(--muted)">${z.hr}</td>
        <td style="color:var(--muted)">${z.when}</td>
      </tr>`;
  });
}

function renderSchedule() {
  const container = document.getElementById('schedule-container');
  if (container.dataset.rendered === '1') return;
  container.dataset.rendered = '1';

  // Group weeks into phases
  let lastPhase = null;
  let phaseDiv = null;

  weekKeys.forEach(wk => {
    const rows = weeks[wk];
    const phase = rows[0].phase;
    const note = rows.find(r => r.weekNote && r.weekNote !== 'nan')?.weekNote || '';
    const hrs = rows.find(r => r.wkHrs && r.wkHrs !== 'nan')?.wkHrs || '';

    if (phase !== lastPhase) {
      lastPhase = phase;
      const pKey = phase.split(' ')[0];
      const color = PHASE_COLORS[pKey] || '#888';
      phaseDiv = document.createElement('div');
      phaseDiv.className = 'sched-phase';
      phaseDiv.innerHTML = '<div class="sched-phase-header"><span class="sched-phase-dot" style="background:' + color + '"></span><span class="sched-phase-title">' + phase + '</span></div>';
      container.appendChild(phaseDiv);
    }

    const wkBlock = document.createElement('div');
    wkBlock.className = 'sched-week';

    const hasToday = rows.some(r => isToday(r.date));
    const wkHeader = document.createElement('div');
    wkHeader.className = 'sched-week-header' + (hasToday ? ' sched-week-today' : '');
    wkHeader.innerHTML =
      '<span class="sched-wk-label">' + wk + '</span>' +
      (hrs ? '<span class="sched-wk-hrs">' + hrs + '</span>' : '') +
      (note ? '<span class="sched-wk-note">💡 ' + note + '</span>' : '');
    wkBlock.appendChild(wkHeader);

    rows.forEach(row => {
      const idx = TRAINING_DATA.indexOf(row);
      const done = completedSet.has(idx);
      const today = isToday(row.date);
      const typeClass = getTypeColor(row.type);
      const summary = getSummary(row.detail);
      const detail = formatDetail(row.detail);

      const rowEl = document.createElement('div');
      rowEl.className = 'sched-row' + (today ? ' sched-today' : '') + (done ? ' sched-done' : '');
      rowEl.id = 'sched-card-' + idx;
      rowEl.innerHTML =
        '<div class="sched-row-header" onclick="toggleSchedRow(this.parentElement)">' +
          '<div class="sched-check ' + (done ? 'done' : '') + '" id="sched-check-' + idx + '" onclick="toggleSchedComplete(' + idx + ', event)">' + (done ? '✓' : '') + '</div>' +
          '<div class="sched-day">' + row.day + '</div>' +
          '<div class="sched-date">' + row.date.replace(', 2026','').replace(', 2025','') + '</div>' +
          (today ? '<div class="today-badge">TODAY</div>' : '') +
          '<div class="type-badge ' + typeClass + '">' + row.type + '</div>' +
          '<div class="sched-summary">' + summary + '</div>' +
          '<div class="day-chevron">▼</div>' +
        '</div>' +
        (detail ? '<div class="day-detail"><div class="detail-text">' + detail + '</div></div>' : '');

      wkBlock.appendChild(rowEl);
    });

    phaseDiv.appendChild(wkBlock);
  });

  // Scroll today into view
  setTimeout(() => {
    const todayEl = container.querySelector('.sched-today');
    if (todayEl) todayEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function toggleSchedRow(cardEl) {
  cardEl.classList.toggle('open');
}

function toggleSchedComplete(idx, e) {
  e.stopPropagation();
  const checkEl = document.getElementById('sched-check-' + idx);
  const planCheckEl = document.getElementById('check-' + idx);
  const done = !completedSet.has(idx);
  if (!done) {
    completedSet.delete(idx);
    checkEl.classList.remove('done'); checkEl.textContent = '';
    if (planCheckEl) { planCheckEl.classList.remove('done'); planCheckEl.textContent = ''; }
    document.getElementById('sched-card-' + idx)?.classList.remove('sched-done');
    document.getElementById('card-' + idx)?.classList.remove('completed');
  } else {
    completedSet.add(idx);
    checkEl.classList.add('done'); checkEl.textContent = '✓';
    if (planCheckEl) { planCheckEl.classList.add('done'); planCheckEl.textContent = '✓'; }
    document.getElementById('sched-card-' + idx)?.classList.add('sched-done');
    document.getElementById('card-' + idx)?.classList.add('completed');
  }
  saveCompletion(idx, done);
  updateProgress();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'schedule') renderSchedule();
}

showApp();
